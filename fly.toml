# fly.toml app configuration file generated for xmas-bot on 2026-05-22T08:09:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'xmas-bot'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
